name: Build X-Down APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Auto Rebrand to X-Down
        run: |
          # Nomlarni o'zgartirish
          find . -name "strings.xml" -type f -exec sed -i 's/Seal Plus/X-Down/g' {} +
          find . -name "strings.xml" -type f -exec sed -i 's/Seal/X-Down/g' {} +
          # Paket nomini o'zgartirish
          find . -name "build.gradle*" -type f -exec sed -i 's/com.junkfood.seal/com.shaxzod.xdown/g' {} +

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: X-Down-Final-APK
          path: app/build/outputs/apk/debug/*.apk
